# Runs the published Docker Hub images (built by CI on every version tag).
# Update: docker compose pull && docker compose up -d
# Local development from source instead:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  trading_backend:
    image: davidsteg/argus-backend:${ARGUS_VERSION:-latest}
    container_name: argus_backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-claude-opus-4-8}
      - ANALYST_OLLAMA_BASE_URL=${ANALYST_OLLAMA_BASE_URL:-}
      - ANALYST_OLLAMA_API_KEY=${ANALYST_OLLAMA_API_KEY:-}
      - ANALYST_OLLAMA_MODEL=${ANALYST_OLLAMA_MODEL:-deepseek-r1}
      - ANALYST_TRADE_REVIEW_INTERVAL_HOURS=${ANALYST_TRADE_REVIEW_INTERVAL_HOURS:-4}
      - ANALYST_TRADE_LOOKBACK=${ANALYST_TRADE_LOOKBACK:-50}
      - TRADING_SYMBOLS=${TRADING_SYMBOLS:-ALL}
      - DB_PATH=/app/shared/argus_state.db
    volumes:
      - db_data:/app/shared
    networks:
      - argus_network
    ports:
      - "${API_PORT:-8000}:8000"

  # Crypto engine: same image, MARKET=crypto. Trades spot USD pairs 24/7,
  # long-only, against the SAME Alpaca account but its OWN SQLite DB file
  # (argus_crypto.db) in the shared volume, so its state is fully isolated
  # from the equities engine.
  trading_crypto_backend:
    image: davidsteg/argus-backend:${ARGUS_VERSION:-latest}
    container_name: argus_crypto_backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
      - MARKET=crypto
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-claude-opus-4-8}
      - ANALYST_OLLAMA_BASE_URL=${ANALYST_OLLAMA_BASE_URL:-}
      - ANALYST_OLLAMA_API_KEY=${ANALYST_OLLAMA_API_KEY:-}
      - ANALYST_OLLAMA_MODEL=${ANALYST_OLLAMA_MODEL:-deepseek-r1}
      - CRYPTO_REGIME_SYMBOL=${CRYPTO_REGIME_SYMBOL:-BTC/USD}
      - CRYPTO_BASE_EQUITY_USD=${CRYPTO_BASE_EQUITY_USD:-100000}
      - DB_PATH=/app/shared/argus_crypto.db
    volumes:
      - db_data:/app/shared
    networks:
      - argus_network
    ports:
      - "${CRYPTO_API_PORT:-8001}:8000"

  trading_frontend:
    image: davidsteg/argus-frontend:${ARGUS_VERSION:-latest}
    container_name: argus_frontend
    restart: unless-stopped
    depends_on:
      - trading_backend
      - trading_crypto_backend
    environment:
      - TZ=Europe/Zurich
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - DB_PATH=/app/shared/argus_state.db
      # The crypto engine's DB lives beside the equities DB in the same volume,
      # so the one dashboard can read both and switch between them.
      - CRYPTO_DB_PATH=/app/shared/argus_crypto.db
      # Dashboard actions (resume from KILLED, run optimizer now) call the
      # backend debug API over the compose network; data reads stay on the
      # shared SQLite volume. One API per market.
      - BACKEND_API_URL=${BACKEND_API_URL:-http://trading_backend:8000}
      - CRYPTO_BACKEND_API_URL=${CRYPTO_BACKEND_API_URL:-http://trading_crypto_backend:8000}
    volumes:
      - db_data:/app/shared
    networks:
      - argus_network
    ports:
      - "${FRONTEND_PORT:-8080}:8080"

volumes:
  db_data:
    driver: local

networks:
  argus_network:
    driver: bridge
