services:
  trading_backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: argus_backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-claude-opus-4-8}
      - TRADING_SYMBOLS=${TRADING_SYMBOLS:-ALL}
      - WATCHLIST_SIZE=${WATCHLIST_SIZE:-50}
      - POSITION_SIZE_USD=${POSITION_SIZE_USD:-500}
      - RISK_PER_TRADE_USD=${RISK_PER_TRADE_USD:-20}
      - COOLDOWN_MINUTES=${COOLDOWN_MINUTES:-30}
      - MAX_POSITIONS=${MAX_POSITIONS:-5}
      - DAILY_STOP_LOSS=${DAILY_STOP_LOSS:-100}
      - MIN_PRICE_USD=${MIN_PRICE_USD:-5}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
      - DB_PATH=/app/shared/argus_state.db
    volumes:
      - db_data:/app/shared
    networks:
      - argus_network
    ports:
      - "${API_PORT:-8000}:8000"

  trading_frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: argus_frontend
    restart: unless-stopped
    depends_on:
      - trading_backend
    environment:
      - TZ=Europe/Zurich
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - DB_PATH=/app/shared/argus_state.db
    volumes:
      - db_data:/app/shared
    networks:
      - argus_network
    ports:
      - "${FRONTEND_PORT:-8080}:8080"

volumes:
  db_data:
    driver: local

networks:
  argus_network:
    driver: bridge
