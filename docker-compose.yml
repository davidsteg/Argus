# Runs the published Docker Hub images (built by CI on every version tag).
# Update: docker compose pull && docker compose up -d
# Local development from source instead:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  trading_backend:
    image: davidsteg/argus-backend:${ARGUS_VERSION:-latest}
    container_name: argus_backend
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SENTIMENT_MODEL=${SENTIMENT_MODEL:-claude-opus-4-8}
      - ANALYST_OLLAMA_BASE_URL=${ANALYST_OLLAMA_BASE_URL:-}
      - ANALYST_OLLAMA_API_KEY=${ANALYST_OLLAMA_API_KEY:-}
      - ANALYST_OLLAMA_MODEL=${ANALYST_OLLAMA_MODEL:-deepseek-r1}
      - ANALYST_TRADE_REVIEW_INTERVAL_HOURS=${ANALYST_TRADE_REVIEW_INTERVAL_HOURS:-4}
      - ANALYST_TRADE_LOOKBACK=${ANALYST_TRADE_LOOKBACK:-50}
      - TRADING_SYMBOLS=${TRADING_SYMBOLS:-ALL}
      - DB_PATH=/app/shared/argus_state.db
    volumes:
      - db_data:/app/shared
    networks:
      - argus_network
    ports:
      - "${API_PORT:-8000}:8000"

  trading_frontend:
    image: davidsteg/argus-frontend:${ARGUS_VERSION:-latest}
    container_name: argus_frontend
    restart: unless-stopped
    depends_on:
      - trading_backend
    environment:
      - TZ=Europe/Zurich
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - DB_PATH=/app/shared/argus_state.db
      # Dashboard actions (resume from KILLED, run optimizer now) call the
      # backend debug API over the compose network; data reads stay on the
      # shared SQLite volume.
      - BACKEND_API_URL=${BACKEND_API_URL:-http://trading_backend:8000}
    volumes:
      - db_data:/app/shared
    networks:
      - argus_network
    ports:
      - "${FRONTEND_PORT:-8080}:8080"

volumes:
  db_data:
    driver: local

networks:
  argus_network:
    driver: bridge
